esphome:
  name: zone-a
  friendly_name: "Zone A"

esp32:
  board: esp32dev
  framework:
    type: arduino

# ── Connectivity ──────────────────────────────────────────────────────────────

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Uncomment and fill in after first successful connection to lock in a stable IP:
  manual_ip:
    static_ip: !secret zone_a_static_ip
    gateway: !secret zone_a_gateway
    subnet: 255.255.255.0

  ap:
    ssid: "zone-a-fallback"
    password: !secret fallback_password_a

captive_portal:

api:
  encryption:
    key: !secret api_key_zone_a
  # HA calls this to deliver one sip (ADR-008). All safety lives in the
  # water_plant script + interlocks below — HA only decides WHEN to sip.
  actions:
    - action: water_plant
      variables:
        plant: int
        seconds: int
      then:
        - script.execute:
            id: water_plant
            plant: !lambda 'return plant;'
            seconds: !lambda 'return seconds;'

ota:
  - platform: esphome
    password: !secret ota_password_a

logger:
  level: DEBUG

# ── I2C bus (shared: VL53L0X reservoir sensor 0x29, MCP23017 relay expander 0x20) ──
i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true   # logs any device found on the bus at boot — confirms the VL53L0X

# ── Relay expander (ADR-009): 16-ch relay board driven via MCP23017 @ 0x20 ──────
# Pump = ch0, Valves 1–9 = ch1–9 (see docs/pinout.md). Board is active-low, so
# every relay switch uses `inverted: true` + `restore_mode: ALWAYS_OFF` → relays
# power up OFF and a board-logic glitch can't energize the pump.
mcp23017:
  - id: relay_hub
    address: 0x20

# ── ADC note ──────────────────────────────────────────────────────────────────
# ADC2 pins are unusable when WiFi is active. NEVER assign sensors to:
#   GPIO0, GPIO2, GPIO4, GPIO12, GPIO13, GPIO14, GPIO15, GPIO25, GPIO26, GPIO27
# ADC1 (GPIO32–GPIO39) only. See docs/pinout.md for all assignments.

# ── Soil moisture sensors (Phase 3: all 10 via CD74HC4067 mux) ────────────────
# Mux wiring: SIG→GPIO32, S0→GPIO19, S1→GPIO18, S2→GPIO5, S3→GPIO17,
# VCC→3V3 (NOT 5V), GND→GND, EN→GND. Sensors on channels C0–C9.
# Pothos moved from GPIO33 direct ADC to channel C0 (GPIO33 now free).
# Calibration: V1.2 sensors at 3.3V, dry ≈ 2.2 V → wet ≈ 0.95 V (Pothos-derived
# defaults; calibrate each plant in place and update its curve individually).

cd74hc4067:
  - id: soil_mux
    pin_s0: GPIO19
    pin_s1: GPIO18
    pin_s2: GPIO5
    pin_s3: GPIO17
    delay: 5ms  # settling time after channel switch before ADC read

sensor:
  # ── Reservoir level (VL53L0X time-of-flight, I2C 0x29) ──
  # Mount looking straight down at the water from the reservoir lid.
  # Distance ↑ = water level ↓. ADR-008 reservoir-low interlock: distance > threshold.
  - platform: vl53l0x
    id: reservoir_distance
    name: "Zone A Reservoir Distance"
    address: 0x29
    update_interval: 60s
    unit_of_measurement: "mm"
    accuracy_decimals: 0
    long_range: true
    # vl53l0x reports distance in METERS; convert to mm so the label is correct
    filters:
      - multiply: 1000.0

  # Shared ADC — read only through the mux channels below, never directly
  - platform: adc
    id: mux_adc
    pin: GPIO32
    attenuation: 11db
    update_interval: never

  # ── C0: Pothos ──
  - platform: cd74hc4067
    id: pothos_raw
    cd74hc4067_id: soil_mux
    number: 0
    sensor: mux_adc
    name: "Pothos Moisture Raw"
    update_interval: 10s
    unit_of_measurement: "V"
    entity_category: diagnostic

  - platform: copy
    source_id: pothos_raw
    name: "Pothos Moisture"
    filters:
      - calibrate_linear:
          - 2.2 -> 0.0
          - 0.95 -> 100.0
      - clamp:
          min_value: 0
          max_value: 100
    unit_of_measurement: "%"

  # ── C1: Plant 2 ──
  - platform: cd74hc4067
    id: plant_2_raw
    cd74hc4067_id: soil_mux
    number: 1
    sensor: mux_adc
    name: "Plant 2 Moisture Raw"
