esphome:
  name: zone-a
  friendly_name: "Zone A"

esp32:
  board: esp32dev
  framework:
    type: arduino

# ── Connectivity ──────────────────────────────────────────────────────────────

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Uncomment and fill in after first successful connection to lock in a stable IP:
  manual_ip:
    static_ip: !secret zone_a_static_ip
    gateway: !secret zone_a_gateway
    subnet: 255.255.255.0

  ap:
    ssid: "zone-a-fallback"
    password: !secret fallback_password_a

captive_portal:

api:
  encryption:
    key: !secret api_key_zone_a

ota:
  - platform: esphome
    password: !secret ota_password_a

logger:
  level: DEBUG

# ── ADC note ──────────────────────────────────────────────────────────────────
# ADC2 pins are unusable when WiFi is active. NEVER assign sensors to:
#   GPIO0, GPIO2, GPIO4, GPIO12, GPIO13, GPIO14, GPIO15, GPIO25, GPIO26, GPIO27
# ADC1 (GPIO32–GPIO39) only. See docs/pinout.md for all assignments.

# ── Soil moisture sensors ─────────────────────────────────────────────────────
sensor:
  - platform: adc
    id: pothos_raw
    pin: GPIO33
    name: "Pothos Moisture Raw"
    update_interval: 10s
    attenuation: 11db
    unit_of_measurement: "V"
    entity_category: diagnostic

  - platform: copy
    source_id: pothos_raw
    name: "Pothos Moisture"
    filters:
      - calibrate_linear:
          - 2.2 -> 0.0
          - 1.05 -> 100.0
      - clamp:
          min_value: 0
          max_value: 100
    unit_of_measurement: "%"
