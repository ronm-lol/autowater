  # C9–C15: spare mux channels (Zone A = 9 plants; add a plant sensor block here to expand)

# ── Flood sensing (ADR-004): voltage divider on the gated 12V rail ────────────
# Gated rail → 10k → node → 3.3k → GND (~3.0V at node when 12V present);
# node → 1k series → GPIO23 (current limit / clamp protection).
# Dry:   rail present → GPIO23 ~3V HIGH → off (dry).
# Flood: XH-M131 cuts the rail → GPIO23 pulled to 0V via the lower resistor → on.
# Fail-safe: a broken 12V feed also pulls GPIO23 LOW → reads as flood.
# The watering interlock that consumes this (abort queue + inhibit) is Phase 5.
binary_sensor:
  - platform: gpio
    id: zone_a_flood
    pin:
      number: GPIO23
      mode:
        input: true
        pullup: false   # divider sets the level — do NOT enable internal pull-up
      inverted: true   # divider: dry = HIGH, flood = LOW; invert so on = flood
    name: "Zone A Flood"
    device_class: moisture
    filters:
      - delayed_on: 100ms
      - delayed_off: 1s
    # ADR-008 real-time safety: the hardware killswitch cuts 12V but NOT the relay
    # board's 5V logic, so firmware must clear its own outputs or the pump
    # re-energizes the instant 12V is restored (restart-after-flood runaway).
    on_press:
      then:
        - script.stop: water_plant   # abort any sip in progress
        - switch.turn_off: pump
        - switch.turn_off: valve_1
        - switch.turn_off: valve_2
        - switch.turn_off: valve_3
        - switch.turn_off: valve_4
        - switch.turn_off: valve_5
        - switch.turn_off: valve_6
        - switch.turn_off: valve_7
        - switch.turn_off: valve_8
        - switch.turn_off: valve_9

  # Reservoir-low interlock (ADR-008): water surface too far from the TOF sensor.
  # distance > threshold ⇒ low. Threshold = (sensor-to-empty-bottom distance) −
  # pump-submersion margin, measured PER RESERVOIR (see reservoir_low_threshold).
  # No/unknown reading ⇒ fail safe: report low so watering is refused.
  - platform: template
    id: reservoir_low
    name: "Zone A Reservoir Low"
    device_class: problem
    lambda: |-
      if (id(reservoir_distance).has_state()) {
        return id(reservoir_distance).state > id(reservoir_low_threshold).state;
      }
      return true;

# ── Reservoir-low cutoff distance (mm), tunable in HA ──────────────────────────
# This is a TOF distance (sensor → water surface), NOT a water depth. Calibrate
# per reservoir: measure the distance the mounted sensor reads to the empty
# bottom, then subtract your pump-submersion margin (~50 mm). e.g. 230 mm to
# bottom − 50 mm ⇒ set 180. The 150 default is a placeholder — MUST be set after
# the reservoir is in hand and the sensor is mounted.
number:
  - platform: template
    id: reservoir_low_threshold
    name: "Zone A Reservoir Low Threshold"
    unit_of_measurement: "mm"
    optimistic: true
    restore_value: true
    initial_value: 150
    min_value: 20
    max_value: 400
    step: 5
    entity_category: config
    mode: box

# ── Relays (ADR-009): pump + 9 valves via MCP23017, active-low ─────────────────
# Exposed to HA for maintenance/purge/bench use. The water_plant script is the
# normal path; flood forces all of these OFF regardless (see binary_sensor).
switch:
  - platform: gpio
    name: "Zone A Pump"
    id: pump
    restore_mode: ALWAYS_OFF
    pin:
      mcp23xxx: relay_hub
      number: 0
      mode:
        output: true
      inverted: true

  - platform: gpio
    name: "Zone A Valve 1 (Pothos)"
    id: valve_1
    restore_mode: ALWAYS_OFF
    pin:
      mcp23xxx: relay_hub
      number: 1
      mode:
        output: true
      inverted: true

  - platform: gpio
    name: "Zone A Valve 2"
    id: valve_2
    restore_mode: ALWAYS_OFF
    pin:
      mcp23xxx: relay_hub
      number: 2
      mode:
        output: true
      inverted: true

  - platform: gpio
    name: "Zone A Valve 3"
    id: valve_3
    restore_mode: ALWAYS_OFF
    pin:
      mcp23xxx: relay_hub
      number: 3
      mode:
        output: true
      inverted: true

  - platform: gpio
    name: "Zone A Valve 4"
    id: valve_4
    restore_mode: ALWAYS_OFF
    pin:
      mcp23xxx: relay_hub
      number: 4
      mode:
        output: true
      inverted: true

  - platform: gpio
    name: "Zone A Valve 5"
    id: valve_5
    restore_mode: ALWAYS_OFF
    pin:
      mcp23xxx: relay_hub
      number: 5
      mode:
        output: true
      inverted: true

  - platform: gpio
    name: "Zone A Valve 6"
    id: valve_6
    restore_mode: ALWAYS_OFF
    pin:
      mcp23xxx: relay_hub
      number: 6
      mode:
        output: true
      inverted: true

  - platform: gpio
    name: "Zone A Valve 7"
    id: valve_7
    restore_mode: ALWAYS_OFF
    pin:
      mcp23xxx: relay_hub
      number: 7
      mode:
        output: true
      inverted: true

  - platform: gpio
    name: "Zone A Valve 8"
    id: valve_8
    restore_mode: ALWAYS_OFF
    pin:
      mcp23xxx: relay_hub
      number: 8
      mode:
        output: true
      inverted: true

  - platform: gpio
    name: "Zone A Valve 9"
    id: valve_9
    restore_mode: ALWAYS_OFF
    pin:
      mcp23xxx: relay_hub
      number: 9
      mode:
        output: true
      inverted: true

  # Master watering disable (ADR-008 global interlock). Persists across reboots.
  - platform: template
    name: "Zone A Watering Disable"
    id: global_disable
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

# ── water_plant(N, seconds): the one safe watering primitive (ADR-008) ─────────
# Sequence: refuse if any interlock active → pump on → 500 ms prime → open valve
# N → run (seconds, hard-clamped to MAX_SIP) → close valve → pump off.
# mode: single ⇒ no overlapping sips (one valve open at a time, ADR-002).
script:
  - id: water_plant
    mode: single
    parameters:
      plant: int
      seconds: int
    then:
      - if:
          condition:
            lambda: 'return id(zone_a_flood).state || id(reservoir_low).state || id(global_disable).state;'
          then:
            - logger.log:
                format: "water_plant(%d) REFUSED: flood=%d reservoir_low=%d disable=%d"
                args: ['plant', 'id(zone_a_flood).state', 'id(reservoir_low).state', 'id(global_disable).state']
          else:
            - if:
                condition:
                  lambda: 'return plant < 1 || plant > 9;'
                then:
                  - logger.log:
                      format: "water_plant: invalid plant %d (expected 1-9)"
                      args: ['plant']
                else:
                  - switch.turn_on: pump
                  - delay: 500ms   # prime the pump before any valve opens (ADR-002)
                  - lambda: |-
                      switch (plant) {
                        case 1: id(valve_1).turn_on(); break;
                        case 2: id(valve_2).turn_on(); break;
                        case 3: id(valve_3).turn_on(); break;
                        case 4: id(valve_4).turn_on(); break;
                        case 5: id(valve_5).turn_on(); break;
                        case 6: id(valve_6).turn_on(); break;
                        case 7: id(valve_7).turn_on(); break;
                        case 8: id(valve_8).turn_on(); break;
                        case 9: id(valve_9).turn_on(); break;
                      }
                  # Hard max-sip clamp (ESP32-owned): no single sip exceeds 8 s
                  # (~40 mL @ 300 mL/min nominal). Retune after bench flow test.
                  - delay: !lambda |-
                      int s = seconds;
                      if (s < 0) s = 0;
                      if (s > 8) s = 8;
                      return s * 1000;
                  # Close valve before pump off; turn ALL valves off so a bad
                  # `plant` value can never leave one latched open.
                  - switch.turn_off: valve_1
                  - switch.turn_off: valve_2
                  - switch.turn_off: valve_3
                  - switch.turn_off: valve_4
                  - switch.turn_off: valve_5
                  - switch.turn_off: valve_6
                  - switch.turn_off: valve_7
                  - switch.turn_off: valve_8
                  - switch.turn_off: valve_9
                  - switch.turn_off: pump
